<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .button {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #E5E5EA;
      color: #000;
      text-decoration: none;
      transition: 0.2s;
    }

    .button:hover {
      background: #d4d4d8;
    }

    .button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Tools</h1>

  <a class="button" href="lagenstaffel-mw.html">
    Lagenstaffel MW
  </a>

  <a class="button" href="lagenstaffel-x.html">
    Lagenstaffel X
  </a>

  <a class="button" href="schrift.html">
    Schriftgröße
  </a>

</div>

</body>
</html>
