<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schriftgröße Rechner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f5f5f5;
    }
    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Schriftgröße Rechner</h2>

  <label>Breite (px):</label>
  <input type="number" id="width" placeholder="z.B. 420">

  <label>Höhe (px):</label>
  <input type="number" id="height" placeholder="z.B. 595">

  <button onclick="calculate()">Berechnen</button>

  <div class="result" id="output"></div>
</div>

<script>
function calculate() {
  const B = parseFloat(document.getElementById('width').value);
  const H = parseFloat(document.getElementById('height').value);

  if (!B || !H) {
    document.getElementById('output').innerText = "Bitte gültige Werte eingeben.";
    return;
  }

  const result = Math.pow((Math.pow(B, Math.sqrt(2)) * H), 1/3) / 420;

  document.getElementById('output').innerText =
    "Optimale Strichstärke: " + result.toFixed(3) + " mm (≈ " + (Math.round(result * 100) / 100).toFixed(2) + " mm)";
}
</script>

</body>
</html>
